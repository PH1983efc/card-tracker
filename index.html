<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Collection Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
    :root {
        --gold: #c9a84c;
        --gold-light: #e8cc7a;
        --gold-dim: #7a6228;
        --bg: #0d0d10;
        --bg-2: #13131a;
        --bg-3: #1a1a24;
        --surface: #1e1e2a;
        --surface-2: #252535;
        --border: #2e2e42;
        --border-gold: rgba(201,168,76,0.3);
        --text: #e8e0d0;
        --text-dim: #8a8070;
        --got-color: #4caf82;
        --missing-color: #c94c4c;
        --collecting-color: #4c7ec9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Crimson Pro', Georgia, serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Background texture */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.07) 0%, transparent 70%),
            repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.01) 2px,
                rgba(255,255,255,0.01) 4px
            );
        pointer-events: none;
        z-index: 0;
    }

    /* HEADER */
    header {
        position: relative;
        text-align: center;
        padding: 48px 20px 32px;
        border-bottom: 1px solid var(--border-gold);
        z-index: 1;
    }

    header::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .header-eyebrow {
        font-family: 'Cinzel', serif;
        font-size: 10px;
        letter-spacing: 0.4em;
        color: var(--gold-dim);
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    h1 {
        font-family: 'Cinzel', serif;
        font-size: clamp(24px, 5vw, 42px);
        font-weight: 700;
        color: var(--gold-light);
        letter-spacing: 0.05em;
        text-shadow: 0 0 40px rgba(201,168,76,0.3);
        line-height: 1.1;
    }

    /* STATS BAR */
    .stats-bar {
        display: flex;
        justify-content: center;
        gap: 0;
        padding: 0 20px;
        position: relative;
        z-index: 1;
        border-bottom: 1px solid var(--border);
        background: var(--bg-2);
    }

    .stat {
        padding: 14px 28px;
        text-align: center;
        border-right: 1px solid var(--border);
        min-width: 100px;
    }

    .stat:first-child { border-left: 1px solid var(--border); }

    .stat-value {
        font-family: 'Cinzel', serif;
        font-size: 22px;
        color: var(--gold);
        display: block;
        line-height: 1;
    }

    .stat-label {
        font-size: 11px;
        letter-spacing: 0.15em;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-top: 4px;
        display: block;
    }

    /* NAV */
    nav {
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 16px 20px;
        position: relative;
        z-index: 1;
        flex-wrap: wrap;
    }

    .nav-btn {
        font-family: 'Cinzel', serif;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 10px 20px;
        background: transparent;
        color: var(--text-dim);
        border: 1px solid var(--border);
        border-radius: 2px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }

    .nav-btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, transparent 40%, rgba(201,168,76,0.05));
        opacity: 0;
        transition: opacity 0.2s;
    }

    .nav-btn:hover { color: var(--gold); border-color: var(--border-gold); }
    .nav-btn:hover::before { opacity: 1; }

    .nav-btn.active {
        color: var(--gold);
        border-color: var(--gold);
        background: rgba(201,168,76,0.08);
    }

    /* FILTERS */
    .filters {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 0 20px 20px;
        position: relative;
        z-index: 1;
        flex-wrap: wrap;
    }

    .filters select,
    .filters input {
        font-family: 'Crimson Pro', serif;
        font-size: 15px;
        padding: 10px 16px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 2px;
        outline: none;
        transition: border-color 0.2s;
        min-width: 180px;
    }

    .filters select:focus,
    .filters input:focus {
        border-color: var(--border-gold);
    }

    .filters select option { background: var(--surface); }

    /* CARD GRID */
    .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        padding: 10px 24px 40px;
        position: relative;
        z-index: 1;
    }

    /* CARD */
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        cursor: default;
        animation: cardIn 0.3s ease both;
        position: relative;
    }

    @keyframes cardIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.2);
        border-color: var(--border-gold);
    }

    .card.is-got {
        border-color: rgba(76,175,130,0.25);
    }

    .card.is-got::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--got-color), transparent);
    }

    .card.is-missing::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--missing-color), transparent);
    }

    .card-top {
        padding: 14px 14px 10px;
        border-bottom: 1px solid var(--border);
    }

    .card-number {
        font-family: 'Cinzel', serif;
        font-size: 10px;
        color: var(--gold-dim);
        letter-spacing: 0.15em;
        margin-bottom: 5px;
    }

    .card-name {
        font-family: 'Cinzel', serif;
        font-size: 14px;
        color: var(--text);
        line-height: 1.3;
        margin-bottom: 4px;
    }

    .card-set {
        font-size: 12px;
        color: var(--text-dim);
        font-style: italic;
    }

    .card-body {
        padding: 10px 14px;
    }

    .card-variant {
        font-size: 12px;
        color: var(--text-dim);
        margin-bottom: 6px;
        min-height: 16px;
    }

    .card-description {
        font-size: 13px;
        color: var(--text-dim);
        line-height: 1.4;
        margin-bottom: 12px;
        min-height: 18px;
    }

    /* TOGGLE */
    .got-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        user-select: none;
    }

    .toggle-track {
        width: 38px;
        height: 20px;
        border-radius: 10px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        position: relative;
        transition: background 0.25s, border-color 0.25s;
        flex-shrink: 0;
    }

    .toggle-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--text-dim);
        position: absolute;
        top: 2px;
        left: 2px;
        transition: transform 0.25s, background 0.25s;
    }

    .is-got .toggle-track {
        background: rgba(76,175,130,0.2);
        border-color: var(--got-color);
    }

    .is-got .toggle-thumb {
        transform: translateX(18px);
        background: var(--got-color);
    }

    .toggle-label {
        font-family: 'Cinzel', serif;
        font-size: 11px;
        letter-spacing: 0.15em;
        color: var(--text-dim);
        transition: color 0.2s;
    }

    .is-got .toggle-label {
        color: var(--got-color);
    }

    /* COLLECTING BADGE */
    .collecting-badge {
        display: inline-block;
        margin-top: 8px;
        font-size: 10px;
        font-family: 'Cinzel', serif;
        letter-spacing: 0.1em;
        color: var(--collecting-color);
        border: 1px solid rgba(76,126,201,0.4);
        padding: 2px 7px;
        border-radius: 2px;
    }

    /* EMPTY STATE */
    .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 20px;
        color: var(--text-dim);
    }

    .empty-state .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    .empty-state p {
        font-family: 'Cinzel', serif;
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
    }

    /* Hidden Excel section */
    #excelUploadSection { display: none !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
</style>
</head>

<body>

<header>
    <div class="header-eyebrow">Personal Registry</div>
    <h1>Card Collection</h1>
</header>

<!-- Stats Bar -->
<div class="stats-bar">
    <div class="stat">
        <span class="stat-value" id="statTotal">—</span>
        <span class="stat-label">Total</span>
    </div>
    <div class="stat">
        <span class="stat-value" id="statGot" style="color: var(--got-color)">—</span>
        <span class="stat-label">Obtained</span>
    </div>
    <div class="stat">
        <span class="stat-value" id="statMissing" style="color: var(--missing-color)">—</span>
        <span class="stat-label">Missing</span>
    </div>
    <div class="stat">
        <span class="stat-value" id="statCollecting" style="color: var(--collecting-color)">—</span>
        <span class="stat-label">Collecting</span>
    </div>
</div>

<!-- Nav -->
<nav>
    <button class="nav-btn active" onclick="switchView('all', this)">All</button>
    <button class="nav-btn" onclick="switchView('got', this)">Obtained</button>
    <button class="nav-btn" onclick="switchView('missing', this)">Missing</button>
    <button class="nav-btn" onclick="switchView('collecting', this)">Collecting</button>
</nav>

<!-- Filters -->
<div class="filters">
    <select id="setFilter" onchange="applyFilters()">
        <option value="">All Sets</option>
    </select>
    <input type="text" id="searchBox" placeholder="Search cards…" oninput="applyFilters()">
</div>

<!-- Card Grid -->
<div id="cardGrid" class="card-grid"></div>

<!-- Hidden Excel section -->
<div id="excelUploadSection">
    <input type="file" id="excelFile" accept=".xlsx" />
    <button onclick="loadExcelFile()">Upload Excel</button>
</div>

<script>
/* ============================================================
   GLOBAL STATE
============================================================ */
let cards = [];
let filteredCards = [];
let currentView = "all";

/* ============================================================
   VIEW SWITCHING
============================================================ */
function switchView(view, btn) {
    currentView = view;

    // Update active button
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    applyFilters();
}

/* ============================================================
   FILTERS
============================================================ */
function applyFilters() {
    const setFilter = document.getElementById("setFilter").value;
    const search = document.getElementById("searchBox").value.toLowerCase();

    filteredCards = cards.filter(card => {
        let matchesSet = true;
        if (setFilter !== "") {
            const [filterSet, filterYear] = setFilter.split("|||");
            matchesSet = card.set === filterSet && card.year === filterYear;
        }

        const matchesSearch =
            card.id.toLowerCase().includes(search) ||
            card.name.toLowerCase().includes(search) ||
            card.description.toLowerCase().includes(search);

        let matchesView = true;
        if (currentView === "missing") {
            matchesView = !card.got;
        } else if (currentView === "got") {
            matchesView = card.got;
        } else if (currentView === "collecting") {
            matchesView = card.collecting && card.collecting.trim() !== "";
        }

        return matchesSet && matchesSearch && matchesView;
    });

    renderCardGrid();
    updateStats();
}

/* ============================================================
   STATS
============================================================ */
function updateStats() {
    const total = cards.length;
    const got = cards.filter(c => c.got).length;
    const missing = total - got;
    const collecting = cards.filter(c => c.collecting && c.collecting.trim() !== "").length;

    document.getElementById("statTotal").textContent = total;
    document.getElementById("statGot").textContent = got;
    document.getElementById("statMissing").textContent = missing;
    document.getElementById("statCollecting").textContent = collecting;
}

/* ============================================================
   POPULATE SET DROPDOWN
============================================================ */
function populateSetDropdown() {
    const dropdown = document.getElementById("setFilter");
    const comboMap = new Map();

    cards.forEach(card => {
        const key = `${card.set}|||${card.year}`;
        if (!comboMap.has(key)) {
            comboMap.set(key, { set: card.set, year: card.year });
        }
    });

    const combos = Array.from(comboMap.values());
    combos.sort((a, b) => {
        const yearCompare = b.year.localeCompare(a.year);
        if (yearCompare !== 0) return yearCompare;
        return a.set.localeCompare(b.set);
    });

    dropdown.innerHTML = `<option value="">All Sets</option>`;
    combos.forEach(({ set, year }) => {
        const value = `${set}|||${year}`;
        dropdown.innerHTML += `<option value="${value}">${set} ${year}</option>`;
    });
}

/* ============================================================
   RENDER CARD GRID
============================================================ */
function renderCardGrid() {
    const grid = document.getElementById("cardGrid");
    grid.innerHTML = "";

    if (filteredCards.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">◈</div>
                <p>No cards found</p>
            </div>`;
        return;
    }

    filteredCards.forEach((card, i) => {
        const div = document.createElement("div");
        div.className = "card" + (card.got ? " is-got" : " is-missing");
        div.style.animationDelay = `${Math.min(i * 30, 300)}ms`;

        const collectingBadge = (card.collecting && card.collecting.trim() !== "")
            ? `<div class="collecting-badge">◈ Collecting</div>`
            : "";

        div.innerHTML = `
            <div class="card-top">
                <div class="card-number">#${card.number} · ${card.year}</div>
                <div class="card-name">${card.name}</div>
                <div class="card-set">${card.set}</div>
            </div>
            <div class="card-body">
                <div class="card-variant">${card.variant || ""}</div>
                <div class="card-description">${card.description || ""}</div>
                <label class="got-toggle" onclick="toggleGot('${card.id}')">
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                    <span class="toggle-label">${card.got ? "OBTAINED" : "MISSING"}</span>
                </label>
                ${collectingBadge}
            </div>
        `;

        grid.appendChild(div);
    });
}

/* ============================================================
   TOGGLE GOT STATUS
============================================================ */
function toggleGot(cardId) {
    const card = cards.find(c => c.id === cardId);
    if (!card) return;

    card.got = !card.got;
    applyFilters();

    // Fire-and-forget update to Google Sheets
    updateCardToGoogleSheets(cardId, card.got);
}

async function updateCardToGoogleSheets(cardId, gotValue) {
    try {
        await fetch('/api/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: cardId, got: gotValue })
        });
    } catch (err) {
        console.error("Failed to update Google Sheets:", err);
    }
}

/* ============================================================
   EXCEL (hidden, preserved)
============================================================ */
async function loadExcelFile() {
    const fileInput = document.getElementById("excelFile");
    if (!fileInput.files.length) return;
    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = function (e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        parseWorkbook(workbook);
    };
    reader.readAsArrayBuffer(file);
}

function parseWorkbook(workbook) {
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    cards = rows.slice(1).map(row => ({
        id: row[0] || "",
        year: row[1] || "",
        set: row[2] || "",
        number: row[3] || "",
        name: row[4] || "",
        description: row[5] || "",
        variant: row[6] || "",
        collecting: row[7] || "",
        got: (row[8] || "").toString().toLowerCase() === "true"
    }));
    populateSetDropdown();
    applyFilters();
}

/* ============================================================
   GOOGLE SHEETS → LOAD CARDS
============================================================ */
async function loadCardsFromGoogleSheets() {
    try {
        const res = await fetch('/api/read');
        const data = await res.json();

        if (!data.success) {
            console.error("Failed to load Google Sheets data");
            return;
        }

        cards = data.rows.slice(1).map(row => ({
            id: row[0] || "",
            year: row[1] || "",
            set: row[2] || "",
            number: row[3] || "",
            name: row[4] || "",
            description: row[5] || "",
            variant: row[6] || "",
            collecting: row[7] || "",
            got: (row[8] || "").toString().toLowerCase() === "true"
        }));

        populateSetDropdown();
        applyFilters();

    } catch (err) {
        console.error("Error loading Google Sheets:", err);
    }
}

/* ============================================================
   INIT
============================================================ */
(async function init() {
    await loadCardsFromGoogleSheets();
})();
</script>
</body>
</html>
