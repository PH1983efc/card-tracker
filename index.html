<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Collection Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- XLSX Library (kept for Option C, but UI will be hidden) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    :root {
        --accent: #2a7de1;
        --accent-hover: #1d5cad;
        --bg-light: #f5f7fa;
        --bg-dark: #1e1f22;
        --text-light: #222;
        --text-dark: #e6e6e6;
        --card-bg-light: #ffffff;
        --card-bg-dark: #2a2c31;
        --border-light: #d0d4db;
        --border-dark: #3a3d44;
    }

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: var(--bg-light);
        color: var(--text-light);
        transition: background 0.3s, color 0.3s;
    }

    body.dark-mode {
        background: var(--bg-dark);
        color: var(--text-dark);
    }

    h1 {
        text-align: center;
        margin-top: 20px;
    }

    /* Navigation Bar */
    .navbar {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 15px;
        background: var(--accent);
        color: white;
    }

    .navbar button {
        background: white;
        color: var(--accent);
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .navbar button:hover {
        background: var(--accent-hover);
        color: white;
    }

    /* Card Grid */
    .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
        padding: 20px;
    }

    .card {
        background: var(--card-bg-light);
        border: 1px solid var(--border-light);
        border-radius: 8px;
        padding: 10px;
        transition: background 0.3s, border 0.3s;
    }

    body.dark-mode .card {
        background: var(--card-bg-dark);
        border: 1px solid var(--border-dark);
    }

    .card h3 {
        margin: 0;
        font-size: 16px;
    }

    .card small {
        color: gray;
    }

    /* Filters */
    .filters {
        display: flex;
        justify-content: center;
        gap: 15px;
        padding: 10px;
    }

    select, input[type="text"] {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid var(--border-light);
    }

    /* Hide Excel Upload UI (Option C) */
    #excelUploadSection {
        display: none !important;
    }
</style>
</head>

<body>

<h1>Card Collection Tracker</h1>

<div class="navbar">
    <button onclick="switchView('all')">All Cards</button>
    <button onclick="switchView('missing')">Missing</button>
    <button onclick="switchView('got')">Got</button>
    <button onclick="setView('collecting')">Collecting</button>
    <button onclick="toggleDarkMode()">Dark Mode</button>
</div>

<div class="filters">
    <select id="setFilter" onchange="applyFilters()"></select>
    <input type="text" id="searchBox" placeholder="Search..." oninput="applyFilters()">
</div>

<!-- Main Card Grid -->
<div id="cardGrid" class="card-grid"></div>

<!-- Hidden Excel Upload UI (Option C) -->
<div id="excelUploadSection">
    <input type="file" id="excelFile" accept=".xlsx" />
    <button onclick="loadExcelFile()">Upload Excel</button>
</div>
<script>
/* ============================================================
   GLOBAL STATE
============================================================ */
let cards = [];
let filteredCards = [];
let currentView = "all";
let darkMode = false;
let matchesView = true;

if (currentView === "missing") {
    matchesView = !card.got;
} else if (currentView === "got") {
    matchesView = card.got;
} else if (currentView === "collecting") {
    matchesView = card.collecting && card.collecting.trim() !== "";
}

/* ============================================================
   DARK MODE
============================================================ */
function toggleDarkMode() {
    darkMode = !darkMode;
    document.body.classList.toggle("dark-mode", darkMode);
}

/* ============================================================
   VIEW SWITCHING
============================================================ */
function switchView(view) {
    currentView = view;
    applyFilters();
}

/* ============================================================
   FILTERS
============================================================ */
function applyFilters() {
    const setFilter = document.getElementById("setFilter").value;
    const search = document.getElementById("searchBox").value.toLowerCase();

    filteredCards = cards.filter(card => {
        let matchesSet = true;

        if (setFilter !== "") {
            const [filterSet, filterYear] = setFilter.split("|||");
            matchesSet =
                card.set === filterSet &&
                card.year === filterYear;
        }

        const matchesSearch =
            card.id.toLowerCase().includes(search) ||
            card.name.toLowerCase().includes(search) ||
            card.description.toLowerCase().includes(search);

        let matchesView = true;
        if (currentView === "missing") matchesView = !card.got;
        if (currentView === "got") matchesView = card.got;

        return matchesSet && matchesSearch && matchesView;
    });

    renderCardGrid();
}





/* ============================================================
   POPULATE SET DROPDOWN
============================================================ */
function populateSetDropdown() {
    const dropdown = document.getElementById("setFilter");

    // Build unique (set + year) combinations
    const comboMap = new Map();

    cards.forEach(card => {
        const key = `${card.set}|||${card.year}`;
        if (!comboMap.has(key)) {
            comboMap.set(key, { set: card.set, year: card.year });
        }
    });

    // Convert to array
    const combos = Array.from(comboMap.values());

    // Sort by year (newest → oldest), then alphabetically by set
    combos.sort((a, b) => {
        const yearCompare = b.year.localeCompare(a.year);
        if (yearCompare !== 0) return yearCompare;
        return a.set.localeCompare(b.set);
    });

    // Build dropdown
    dropdown.innerHTML = `<option value="">All Sets</option>`;

    combos.forEach(({ set, year }) => {
        const value = `${set}|||${year}`;
        const label = `${set} ${year}`;
        dropdown.innerHTML += `<option value="${value}">${label}</option>`;
    });
}


/* ============================================================
   RENDER CARD GRID
============================================================ */
function renderCardGrid() {
    const grid = document.getElementById("cardGrid");
    grid.innerHTML = "";

    filteredCards.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${card.name}</h3>
            <small>${card.set} — #${card.number}</small><br>
            <small>${card.year}</small><br>
            <small>${card.variant}</small><br>
            <small>${card.description}</small><br><br>

            <strong>Got:</strong> ${card.got ? "YES" : "NO"}<br><br>

            <button onclick="updateCardToGoogleSheets('${card.id}')">
                Update
            </button>
        `;

        grid.appendChild(div);
    });
}

/* ============================================================
   EXCEL UPLOAD SYSTEM (Option C — UI hidden, code kept)
============================================================ */
async function loadExcelFile() {
    const fileInput = document.getElementById("excelFile");
    if (!fileInput.files.length) return;

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function (e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        parseWorkbook(workbook);
    };

    reader.readAsArrayBuffer(file);
}

function parseWorkbook(workbook) {
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    cards = rows.slice(1).map(row => ({
        id: row[0] || "",
        year: row[1] || "",
        set: row[2] || "",
        number: row[3] || "",
        name: row[4] || "",
        description: row[5] || "",
        variant: row[6] || "",
        collecting: row[7] || "",
        got: (row[8] || "").toString().toLowerCase() === "true"
    }));

    populateSetDropdown();
    applyFilters();
}
</script>
<script>
/* ============================================================
   GOOGLE SHEETS → LOAD CARDS
============================================================ */
<script>
async function loadCardsFromGoogleSheets() {
    try {
        const res = await fetch('/api/read');
        const data = await res.json();

        if (!data.success) {
            console.error("Failed to load Google Sheets data");
            return;
        }

        const rows = data.rows;

        // Debug: See exactly what the sheet is returning
        console.log("First data row:", rows[1]);

        // Convert rows into card objects
        cards = rows.slice(1).map(row => ({
            id: row[0] || "",          // Column A
            year: row[1] || "",        // Column B  ← IMPORTANT
            set: row[2] || "",         // Column C
            number: row[3] || "",      // Column D
            name: row[4] || "",        // Column E
            description: row[5] || "", // Column F
            variant: row[6] || "",     // Column G
            collecting: row[7] || "",  // Column H
            got: (row[8] || "").toString().toLowerCase() === "true" // Column I
        }));

        populateSetDropdown();
        applyFilters();

    } catch (err) {
        console.error("Error loading Google Sheets:", err);
    }
}
</script>

<script>
/* ============================================================
GOOGLE SHEETS → UPDATE CARD
============================================================ */
async function updateCardToGoogleSheets(cardId) {
    const newValue = prompt("Enter new value for GOT (TRUE/FALSE):");
    if (!newValue) return;

    try {
        const response = await fetch('/api/write', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cardId, got: newValue })
        });

        const data = await response.json();

        if (data.success) {
            alert("Updated!");
            await loadCardsFromGoogleSheets();
        } else {
            alert("Error: " + data.message);
        }
    } catch (err) {
        alert("Request failed: " + err.message);
    }
}

/* ============================================================
INITIAL LOAD
============================================================ */
(async function loadCardsFromGoogleSheets() {
    ...
    cards = rows.slice(1).map(...);

    populateSetDropdown();   // ← MUST be here
    applyFilters();
}

</script>
