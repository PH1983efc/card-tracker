<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Collection Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>

:root {
    --blue:#003399;--blue-deep:#001a5e;--royal:#1a3faa;
    --white:#f0f4ff;--white-dim:#8a9ac4;--white-faint:#2a3660;
    --toffee:#d4a017;--toffee-light:#f0bf3a;--toffee-dim:#7a5c0a;
    --got-color:#2ecc71;--missing-color:#e74c3c;
    --bg:#010a1f;--surface:#071535;--surface-2:#0c1f4a;
    --border:#152452;--border-bright:rgba(26,63,170,0.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
    radial-gradient(ellipse 100% 60% at 50% 0%,rgba(26,63,170,0.25) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,51,153,0.15) 0%,transparent 60%),
    repeating-linear-gradient(90deg,transparent 0px,transparent 80px,rgba(255,255,255,0.012) 80px,rgba(255,255,255,0.012) 81px),
    repeating-linear-gradient(0deg,transparent 0px,transparent 80px,rgba(255,255,255,0.008) 80px,rgba(255,255,255,0.008) 81px);
    pointer-events:none;z-index:0;}

/* HEADER */
header{position:relative;z-index:2;background:linear-gradient(180deg,#000d2e 0%,var(--blue-deep) 60%,transparent 100%);padding:0 0 30px;overflow:hidden;}
header::before{content:'';position:absolute;top:0;left:-10%;right:-10%;height:6px;background:repeating-linear-gradient(90deg,var(--blue) 0px,var(--blue) 40px,var(--toffee) 40px,var(--toffee) 50px);}
.header-inner{display:flex;align-items:center;justify-content:center;gap:28px;padding:36px 24px 10px;position:relative;}
.crest{width:72px;height:72px;flex-shrink:0;filter:drop-shadow(0 0 16px rgba(26,63,170,0.8));animation:crestIn 0.6s ease both;}
@keyframes crestIn{from{opacity:0;transform:scale(0.7) rotate(-10deg);}to{opacity:1;transform:scale(1) rotate(0deg);}}
.header-text{text-align:center;}
.header-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.45em;color:var(--toffee);text-transform:uppercase;margin-bottom:6px;animation:fadeUp 0.5s 0.1s ease both;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,7vw,58px);color:var(--white);letter-spacing:0.06em;line-height:1;text-shadow:0 2px 20px rgba(0,51,153,0.8);animation:fadeUp 0.5s 0.15s ease both;}
h1 span{color:var(--toffee-light);}
.header-sub{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.25em;color:var(--white-dim);margin-top:4px;animation:fadeUp 0.5s 0.2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* STATS */
.stats-bar{display:flex;justify-content:center;position:relative;z-index:2;background:rgba(0,13,46,0.85);border-top:1px solid var(--border-bright);border-bottom:1px solid var(--border-bright);backdrop-filter:blur(8px);}
.stat{padding:14px 32px;text-align:center;border-right:1px solid var(--border);flex:1;max-width:160px;}
.stat:first-child{border-left:1px solid var(--border);}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:28px;display:block;line-height:1;}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.2em;color:var(--white-dim);text-transform:uppercase;margin-top:3px;display:block;}

/* SET PROGRESS */
.set-progress{display:none;position:relative;z-index:2;padding:14px 24px;background:rgba(0,26,94,0.7);border-bottom:1px solid var(--border);}
.set-progress.visible{display:block;animation:slideDown 0.25s ease both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.set-progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.set-progress-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--white-dim);}
.set-progress-count{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--toffee-light);}
.set-progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.set-progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--toffee));border-radius:3px;transition:width 0.7s cubic-bezier(0.22,1,0.36,1);width:0%;}
.set-progress-pct{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--white-dim);margin-top:5px;text-align:right;}

/* NAV */
nav{display:flex;justify-content:center;position:relative;z-index:2;background:var(--surface);border-bottom:2px solid var(--border-bright);flex-wrap:wrap;}
.nav-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;padding:14px 28px;background:transparent;color:var(--white-dim);border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;}
.nav-btn:hover{color:var(--white);background:rgba(26,63,170,0.15);}
.nav-btn.active{color:var(--toffee-light);border-bottom-color:var(--toffee);background:rgba(212,160,23,0.07);}

/* FILTERS */
.filters{display:flex;justify-content:center;gap:12px;padding:14px 20px;position:relative;z-index:2;background:rgba(1,10,31,0.6);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.filters select,.filters input{font-family:'Barlow',sans-serif;font-size:14px;padding:9px 14px;background:var(--surface-2);color:var(--white);border:1px solid var(--border);border-radius:3px;outline:none;transition:border-color 0.2s;min-width:200px;}
.filters select:focus,.filters input:focus{border-color:var(--royal);}
.filters select option{background:var(--surface);}

/* TOOLBAR */
.toolbar{display:flex;justify-content:flex-end;gap:10px;padding:10px 20px;position:relative;z-index:2;background:rgba(1,10,31,0.4);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.toolbar-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:8px 16px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--white-dim);transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
.toolbar-btn:hover{color:var(--white);border-color:var(--royal);background:rgba(26,63,170,0.2);}
.toolbar-btn.gold{border-color:var(--toffee-dim);color:var(--toffee-light);}
.toolbar-btn.gold:hover{background:rgba(212,160,23,0.12);border-color:var(--toffee);}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;padding:20px 20px 50px;position:relative;z-index:1;}


/* COLLECTING COLLAPSIBLE SECTIONS */
.collecting-content{padding:20px 20px 50px;position:relative;z-index:1;}
.collecting-group{margin-bottom:10px;}
.collecting-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all 0.2s;user-select:none;gap:14px;}
.collecting-header:hover{border-color:var(--royal);background:var(--surface-2);}
.collecting-header.open{border-radius:4px 4px 0 0;border-bottom-color:var(--border-bright);}
.collecting-chevron{font-size:10px;color:var(--white-dim);transition:transform 0.25s;display:inline-block;margin-right:10px;}
.collecting-header.open .collecting-chevron{transform:rotate(90deg);}
.collecting-group-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--white);}
.collecting-group-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.collecting-group-progress{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.collecting-group-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--toffee));border-radius:2px;transition:width 0.6s ease;}
.collecting-group-count{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--toffee-light);white-space:nowrap;}
.collecting-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;overflow:hidden;}
.collecting-body.open{display:block;animation:slideDown 0.2s ease;}
.collecting-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1px;background:var(--border);}
.collecting-card-grid .card{border:0;border-radius:0;}
@media (max-width:640px){.collecting-header{align-items:flex-start;flex-direction:column;}.collecting-group-meta{width:100%;}.collecting-group-progress{flex:1;width:auto;}}
